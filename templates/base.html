<!DOCTYPE html>
<html>
<head>
    <title>Food App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-light">
    <div class="container-fluid">

        <a class="navbar-brand" href="{% url 'home' %}">🍽️ FoodApp</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>
            </ul>

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link btn btn-warning me-2" href="{% url 'cart' %}">
                        Cart 🛒 ({{ cart_count }})
                    </a>
                </li>

                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <span class="nav-link">Hi, {{ user.username }}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-danger" href="{% url 'logout' %}">Logout</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link btn btn-success" href="{% url 'login' %}">Login</a>
                    </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>

{% block content %}
{% endblock %}

</body>
</html>
