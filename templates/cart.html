<h2>Your Cart</h2>

{% for item in cart_items %}
  <p>
    {{ item.item.meal }} - {{ item.quantity }} x ₹{{ item.item.price }}
    <a href="{% url 'remove_from_cart' item.id %}"></a>
  </p>
{% empty %}
  <p>Your cart is empty</p>
{% endfor %}

<h3>Total: ₹{{ total }}</h3>

<a href="{% url 'place_order' %}" class="btn btn-primary">Place Order</a>
